<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-label="Mon agent administratif — bannière">
  <defs>
    <clipPath id="r"><rect width="1280" height="400" rx="24"/></clipPath>
  </defs>
  <g clip-path="url(#r)" font-family="-apple-system,'SF Pro Text','Helvetica Neue',Arial,sans-serif">
    <!-- fond « paper » du mock-up iOS -->
    <rect width="1280" height="400" fill="#f2f2f7"/>
    <!-- filet supérieur teal, clin d'œil au bandeau de l'app -->
    <rect width="1280" height="10" fill="#0b625a"/>

    <!-- icône -->
    <rect x="84" y="96" width="150" height="150" rx="34" fill="#0b625a"/>
    <rect x="122.2" y="134.2" width="52.6" height="52.6" rx="9" fill="none" stroke="#ffffff" stroke-width="12.3"
          transform="rotate(45 148.5 160.5)"/>
    <line x1="179" y1="191" x2="203" y2="215" stroke="#ffffff" stroke-width="14.6" stroke-linecap="round"/>

    <!-- titre + sous-titre -->
    <text x="278" y="158" font-size="58" font-weight="700" letter-spacing="-1.4" fill="#1c1c1e">Mon agent administratif</text>
    <text x="278" y="206" font-size="27" fill="#5c6b67">Trouver, comprendre et préparer ses démarches — 100&#8202;% sur votre appareil</text>

    <!-- barre de recherche factice, reprise du mock-up -->
    <rect x="278" y="242" width="640" height="66" rx="16" fill="#ffffff" stroke="#dce6e3" stroke-width="1.5"/>
    <circle cx="318" cy="275" r="11" fill="none" stroke="#8a8a8e" stroke-width="3.4"/>
    <line x1="326" y1="283" x2="336" y2="293" stroke="#8a8a8e" stroke-width="3.8" stroke-linecap="round"/>
    <text x="354" y="284" font-size="24" fill="#8a8a8e">ex. j'ai perdu mon passeport</text>
    <rect x="932" y="242" width="76" height="66" rx="16" fill="#0b625a"/>
    <g stroke="#ffffff" stroke-width="4.6" stroke-linecap="round" fill="none">
      <rect x="962" y="258" width="16" height="26" rx="8"/>
      <path d="M954 278a16 16 0 0 0 32 0"/>
      <line x1="970" y1="294" x2="970" y2="300"/>
    </g>

    <!-- pastilles « promesses », style .verif / .tag du mock-up -->
    <g font-size="21" font-weight="600">
      <rect x="278" y="330" width="128" height="40" rx="20" fill="#e1f5ee"/>
      <text x="342" y="356" text-anchor="middle" fill="#0f6e56">Hors-ligne</text>
      <rect x="418" y="330" width="122" height="40" rx="20" fill="#e1f5ee"/>
      <text x="479" y="356" text-anchor="middle" fill="#0f6e56">IA locale</text>
      <rect x="552" y="330" width="240" height="40" rx="20" fill="#e1f5ee"/>
      <text x="672" y="356" text-anchor="middle" fill="#0f6e56">0 donnée collectée</text>
      <rect x="804" y="330" width="256" height="40" rx="20" fill="#fff4e5"/>
      <text x="932" y="356" text-anchor="middle" fill="#a24700">Démonstrateur non officiel</text>
    </g>
  </g>
</svg>
